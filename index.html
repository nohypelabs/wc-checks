<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon - supports both .ico and .png -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WC Check - Inspection App</title>

    <!-- ⚡ Performance Optimization: Preconnect to external resources -->
    <!-- DNS prefetch: Resolve DNS early (fastest, least resource) -->
    <link rel="dns-prefetch" href="https://api.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- Preconnect: Establish early connections (DNS + TCP + TLS) -->
    <link rel="preconnect" href="https://api.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- 🔥 PWA COMPLETELY REMOVED - Pure web app -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Professional toilet monitoring and inspection system" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
